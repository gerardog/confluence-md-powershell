name: CI

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

jobs:
  lint:
    name: Lint (PSScriptAnalyzer)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module PSScriptAnalyzer -Force -Scope CurrentUser

      - name: Run PSScriptAnalyzer
        shell: pwsh
        run: |
          $settings = './PSScriptAnalyzerSettings.psd1'
          $results = Invoke-ScriptAnalyzer -Path . -Recurse -Settings $settings -Severity Warning,Error
          $warnings = @($results | Where-Object { $_.Severity -eq 'Warning' })
          if ($warnings) {
            $warnings | Format-Table -AutoSize
          }
          $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
          if ($errors) {
            $errors | Format-Table -AutoSize
            exit 1
          }
          Write-Host "PSScriptAnalyzer: no errors found."

  test:
    name: Test (Pester)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Pester
        shell: pwsh
        run: Install-Module Pester -Force -Scope CurrentUser -MinimumVersion 5.0.0

      - name: Run tests
        shell: pwsh
        run: ./tests/Run-Tests.ps1

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: pester-test-results
          path: tests/TestResults*.xml
